[build]
  publish = "static"

# Proxy API calls to production so preview deploys can trade
[[redirects]]
  from = "/v1/*"
  to = "https://api.futarchy.ai/v1/:splat"
  status = 200
  force = true

# Serve the landing page at the site root.
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200

# Keep the dashboard on its own route.
[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/dashboard/*"
  to = "/dashboard.html"
  status = 200
